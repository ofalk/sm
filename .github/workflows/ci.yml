name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: sm_db
          POSTGRES_USER: sm_user
          POSTGRES_PASSWORD: sm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install --with-deps

    - name: Run Tests
      env:
        DATABASE_URL: postgresql://sm_user:sm_password@localhost:5432/sm_db
        SECRET_KEY: ci-secret-key
        DEBUG: False
        ALLOWED_HOSTS: "*"
      run: |
        cd sm
        python manage.py collectstatic --noinput
        coverage run --source . manage.py test -v3 --exclude-tag=browser sm.test_audit sm.test_search sm.test_templates sm.test_wsgi sm.test_social clusteroperatingsystem clusterpackage clusterpackagetype clustersoftware domain location operatingsystem patchtime server servermodel server status vendor
        coverage report --fail-under=70
        coverage html

    - name: Run Pycco
      run: |
        find sm/ -type f -name "*.py"|grep -v __pycache__|grep -v __init__.py|grep -v /migrations/ | xargs pycco -p -d pycco -i -s

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: sm/htmlcov/

    - name: Upload pycco documentation
      uses: actions/upload-artifact@v4
      with:
        name: pycco-docs
        path: pycco/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: public/coverage

      - name: Download pycco documentation
        uses: actions/download-artifact@v4
        with:
          name: pycco-docs
          path: public/pycco

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
