{% load sm_theme_bootstrap_tags %}
{% for message in messages %}
    <div class="alert {% get_message_tags message %} alert-dismissable fade show" role="alert">
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
        {{ message }}
    </div>
{% endfor %}
