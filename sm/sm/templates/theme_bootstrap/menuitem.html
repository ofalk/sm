 {% load i18n %}
 <li class="nav-item dropdown" id="tab_{{ itemname }}" style="line-height: 0.8em;">
   <a class="nav-link dropdown-toggle" href="/" id="{{ itemname }}_dropdown"
     data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" title="{% trans itemname.title %}">
    <i class="fa fa-fw {{ icon }}" aria-hidden="true"></i> <span class="hidden-md-up">{% trans itemname.title %}</span>
  </a>
  <div class="dropdown-menu dropdown-menu-right" aria-labelledby="{{ itemname }}_dropdown">
    <a id="{{ itemname }}-list" class="dropdown-item"
      href="{% url itemname|add:':index' %}">
      <i class="fa fa-fw fa-bars" aria-hidden="true"></i> {% trans 'List' %}
    </a>
    <a id="{{ itemname }}-create" class="dropdown-item"
      href="{% url itemname|add:':create' %}">
      <i class="fa fa-fw fa-plus-circle" aria-hidden="true"></i> {% trans 'Create new' %}
    </a>
    {% if search %}
    <a id="{{ itemname }}-create" class="dropdown-item"
      href="{% url itemname|add:':search' %}">
      <i class="fa fa-fw fa-plus-circle" aria-hidden="true"></i> {% trans 'Search' %}
    </a>
    {% endif %}

  </div>
</li>
